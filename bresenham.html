<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title> Bresenham app</title>
    <style>
      body {
        font-family: arial, sans-serif;
      }
/* Contenedor principal: canvas izquierda, tabla derecha */
        #contenedor {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 30px;
            margin-top: 10px;
        }
      canvas {
        border: 1px solid black;
        display: block;
      }
 /* La tabla crece para ocupar el espacio restante */
        #seccion-tabla {
            flex: 1;
            overflow-y: auto;
            max-height: 440px;
        }
      table, th, td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 4px;
        text-align: center;
      }
       table {
            width: 100%;
        }
    </style>
  </head>
  <body>
    <h2>Algoritmo de Bresenham</h2>
    <label>x0: <input type="number" id="x0"></label>
    <label>y0: <input type="number" id="y0"></label>
    <label>x1: <input type="number" id="x1"></label>
    <label>y1: <input type="number" id="y1"></label>
    <button onclick="dibujar()">Dibujar linea</button>
      <!-- Contenedor flex: canvas | tabla -->
    <div id="contenedor">

        <!-- Izquierda: canvas -->
        <canvas id="canvas" width="440" height="440"></canvas>
<!-- Derecha: tabla -->
        <div id="seccion-tabla">
            <h3>Tabla de iteraciones</h3>
            <table id="tabla">
                <tr>
                    <th>Paso</th>
                    <th>x</th>
                    <th>y</th>
                    <th>err</th>
                    <th>e2</th>

   
  </body>
</html>
